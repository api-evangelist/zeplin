- term: Asset
  description: 'Assets are automatically generated while exporting designs based on
    the platform the design is exported. Asset formats and densities change according
    to these platforms.


    Platform | Formats

    ---|---|---

    Base | PNG (1.0, 1.5, 2.0, 3.0, 4.0), and PDF

    Web | PNG (1.0, 2.0, 3.0), SVG, and JPG (bitmap image)

    iOS | PNG (1.0, 2.0, 3.0), and PDF

    Android | PNG (1.0, 1.5, 2.0, 3.0, 4.0), and SVG

    '
