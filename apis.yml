aid: zeplin
name: Zeplin
description: Zeplin is a design-to-development handoff platform that bridges the gap
  between designers and developers by providing a structured workspace for accessing
  design specs, assets, style guides, components, and annotations. The Zeplin REST
  API enables programmatic access to all resources within Zeplin including projects,
  screens, components, layers, assets, and notes exported from Figma, Sketch, and
  Adobe XD. Developers can build custom integrations using read and write operations
  on design data, receive real-time updates via webhooks, and automate design-to-code
  workflows. The API uses OAuth 2.0 with PKCE support and personal access tokens for
  authentication, with an official JavaScript SDK and OpenAPI specification available.
